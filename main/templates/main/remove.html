{% extends "main/layout.html" %}
{% block head_title %}Удаление{% endblock %}
{% block main %}
<div class="card border-danger" style="max-width: 540px">
    <div class="card-body">
        <h5 class="card-title">Удалить запись?</h5>
        <p class="card-text">«{{ record }}» будет удалена без возможности восстановления.</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Удалить</button>
            <a class="btn btn-secondary" href="{% url 'main:list' %}">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
