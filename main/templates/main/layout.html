<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block head_title %}Записи{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <header class="navbar navbar-dark shadow-sm" style="background-color:#0f766e">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'main:list' %}">Управление записями</a>
        </div>
    </header>
    <main class="container py-4">
        {% for note in messages %}
            <div class="alert alert-{{ note.tags|default:'info' }}">{{ note }}</div>
        {% endfor %}
        {% block main %}{% endblock %}
    </main>
</body>
</html>
